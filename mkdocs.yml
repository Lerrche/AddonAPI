site_name: AddonAPI Docs
theme:
  name: material
  language: en
  palette:
    - scheme: slate
      primary: grey
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: grey
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - content.code.copy
    - navigation.sections

nav:
  - Main: index.md
  - Tutorial:
      - Setup: setup.md
      - Creating first mod: tutorials/first.md
  - API Documentation: API.md
