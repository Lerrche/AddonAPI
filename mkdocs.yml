site_name: AddonAPI Docs
site_description: Professional Addon System for Roblox
site_author: Lerche
# site_url: https://Lerrche.github.io/AddonAPI/ # Раскомментируй, когда деплой заработает

repo_name: Lerrche/AddonAPI
repo_url: https://github.com/Lerrche/AddonAPI

theme:
  name: material
  language: en
  features:
    - navigation.tabs       # Полоска с разделами сверху, как у ZonePlus
    - navigation.tracking   # Обновляет URL при скролле
    - content.code.copy     # Кнопка копирования кода
  
  palette:
    # Автоматическое переключение, но с упором на Slate (темную тему)
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: grey         # Серая верхняя полоска
      accent: indigo        # Цвет ссылок и активных элементов
      toggle:
        icon: material/weather-night
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: grey
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode

markdown_extensions:
  - admonition          # Красивые блоки !!! info и т.д.
  - pymdownx.superfences # Улучшенная подсветка кода
  - toc:
      permalink: true    # Ссылки-якоря у заголовков

nav:
  - Main: index.md
  - Tutorial:
      - Setup: setup.md
      - Creating first mod: tutorials/first.md
  - API Documentation: API.md
